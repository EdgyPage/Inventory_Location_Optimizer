site_name: Inventory Location Optimizer — Results
site_description: Simulation results and analysis for warehouse SKU placement strategies.
site_url: https://edgypage.github.io/Inventory_Location_Optimizer/
repo_url: https://github.com/EdgyPage/Inventory_Location_Optimizer
repo_name: EdgyPage/Inventory_Location_Optimizer

theme:
  name: material
  palette:
    - scheme: slate
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - scheme: default
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - search.suggest

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - glightbox        # zoom result images on click

markdown_extensions:
  - attr_list        # image sizing/attributes: ![](img.png){ width=600 }
  - md_in_html
  - tables
  - admonition       # note/warning callouts
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

nav:
  - Home: index.md
  - Authoring guide: authoring.md
  - Results:
      - Overview: results/index.md
      - 'Example run (2026-06)': results/example-run.md
