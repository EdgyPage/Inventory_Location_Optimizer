site_name: Inventory Location Optimizer — Results
site_description: Simulation results and analysis for warehouse SKU placement strategies.
site_url: https://edgypage.github.io/Inventory_Location_Optimizer/
repo_url: https://github.com/EdgyPage/Inventory_Location_Optimizer
repo_name: EdgyPage/Inventory_Location_Optimizer

theme:
  name: material
  palette:
    - scheme: slate
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - scheme: default
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - search.suggest

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - macros:
      module_name: docs/macros   # docs/macros.py; injects run params/formulas from committed JSON
  - glightbox        # zoom result images on click

markdown_extensions:
  - attr_list        # image sizing/attributes: ![](img.png){ width=600 }
  - md_in_html
  - tables
  - admonition       # note/warning callouts
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details   # collapsible ??? blocks (per-config figure groups)

# Kept in the repo but excluded from the built site (maintainer / dev reference).
exclude_docs: |
  authoring.md
  example-run.md
  site-usage.md
  gpu_assessment.md
  gpu_auction_assessment.md

nav:
  - Home: index.md
  - Future experiment discussion: future-experiments.md
  - Experiment 1:
      - Overview: experiments/experiment-1/index.md
      - Simulation lifecycle: experiments/experiment-1/comparison-overview.md
      - Inventory distributions: experiments/experiment-1/inventory.md
      - Assignment functions: experiments/experiment-1/assignment-functions.md
      - 'Comparison — 2026-06-24': experiments/experiment-1/comparison-20260624.md
      - 'Comparison — 2026-06-27': experiments/experiment-1/comparison-20260627.md
      - Full results: experiments/experiment-1/full-results.md
      - Glossary: experiments/experiment-1/glossary.md
