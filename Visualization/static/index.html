<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warehouse Pick Simulation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <header id="top-bar">
      <span id="title">Warehouse Pick Simulation</span>
      <span id="loading-msg">Loading simulation&hellip;</span>
    </header>

    <div id="main">
      <div id="warehouse-wrap">
        <svg id="warehouse-svg"></svg>
      </div>

      <aside id="side-panel">
        <div id="picker-cards"></div>

        <div id="legend">
          <div class="legend-title">Bin State</div>
          <div class="legend-item"><span class="swatch" style="background:#4CAF50"></span>Full</div>
          <div class="legend-item"><span class="swatch" style="background:#FF9800"></span>Partial (&ge;50%)</div>
          <div class="legend-item"><span class="swatch" style="background:#f44336"></span>Low (&lt;50%)</div>
          <div class="legend-item"><span class="swatch" style="background:#3a2a2a"></span>Emptied</div>
          <div class="legend-item"><span class="swatch" style="background:#2a2a3a"></span>Unstocked</div>
          <div class="legend-item"><span class="swatch" style="background:#00E5FF"></span>Active pick</div>
          <div class="legend-title" style="margin-top:10px">Aisle Tint</div>
          <div class="legend-item"><span class="swatch" style="background:#1a2335"></span>Conveyable</div>
          <div class="legend-item"><span class="swatch" style="background:#231a35"></span>Non-conveyable</div>
        </div>
      </aside>
    </div>

    <footer id="controls">
      <button id="play-btn" title="Play / Pause">&#9654;</button>
      <button id="reset-btn" title="Reset to t=0">&#8635;</button>
      <input id="time-slider" type="range" min="0" max="100" step="0.5" value="0">
      <span id="time-display">t&nbsp;=&nbsp;0.0</span>
      <label class="speed-label">
        Speed:
        <select id="speed-select">
          <option value="1">1&times;</option>
          <option value="5" selected>5&times;</option>
          <option value="10">10&times;</option>
          <option value="20">20&times;</option>
        </select>
      </label>
    </footer>

  </div>
  <script src="app.js"></script>
</body>
</html>
